name: Sync EcuMaster catalog

on:
  schedule:
    # Every 3 hours. GitHub may delay scheduled runs by a few minutes under load.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        run: |
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.streetprogarage.com/api/cron/sync-ecumaster")
          echo "HTTP status: $status"
          cat /tmp/response.json
          if [ "$status" -ge 300 ]; then
            echo "Sync request failed"
            exit 1
          fi
